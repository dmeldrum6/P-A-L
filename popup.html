<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P-A-L</title>
  <style>
    :root {
      --primary: #6366f1;
      --accent: #8b5cf6;
      --bg: #09090f;
      --surface: #111120;
      --surface-2: #18182c;
      --border: rgba(255, 255, 255, 0.07);
      --border-2: rgba(255, 255, 255, 0.12);
      --text: #f0f0f8;
      --text-2: #8888a8;
      --text-3: #50506a;
      --green: #22c55e;
      --red: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      padding: 16px 18px;
      background: linear-gradient(135deg, #16103a 0%, #1e1248 60%, #16103a 100%);
      border-bottom: 1px solid rgba(139, 92, 246, 0.18);
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 90% 50%, rgba(139, 92, 246, 0.12), transparent 65%);
      pointer-events: none;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .logo-badge {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(99, 102, 241, 0.4);
    }

    .logo-info h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
      line-height: 1;
    }

    .logo-info p {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 3px;
      letter-spacing: 0.2px;
    }

    /* ── Content ── */
    .content {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    /* ── Status card ── */
    .status-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.2s;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 3px;
      flex-shrink: 0;
      background: var(--text-3);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-card.configured .status-indicator {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    .status-card.not-configured .status-indicator {
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }

    .status-body .label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .status-body .desc {
      font-size: 11px;
      color: var(--text-2);
      line-height: 1.4;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.15s ease;
      font-family: inherit;
      letter-spacing: 0.1px;
    }

    .btn svg {
      flex-shrink: 0;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(1.12);
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.38);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: none;
      filter: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border-2);
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 14px 13px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-3);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <div class="logo-badge">🤖</div>
      <div class="logo-info">
        <h1>P-A-L</h1>
        <p>Personal AI Listener</p>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="status" class="status-card">
      <div class="status-indicator"></div>
      <div class="status-body">
        <div class="label">Checking status…</div>
        <div class="desc">Loading configuration</div>
      </div>
    </div>

    <button id="open-settings" class="btn btn-primary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Open Settings
    </button>

    <button id="reload-page" class="btn btn-secondary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Reload Current Page
    </button>
  </div>

  <div class="footer">
    P-A-L appears on all pages — look for it on the right side of your browser.
  </div>

  <script src="popup.js"></script>
</body>
</html>

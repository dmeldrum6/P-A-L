<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P-A-L</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 8px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 20px;
    }

    .status {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .status.configured {
      border-left: 3px solid #22c55e;
    }

    .status.not-configured {
      border-left: 3px solid #ef4444;
    }

    .status-label {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: none;
    }

    .info {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      margin-top: 16px;
      line-height: 1.4;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <h1>🤖 P-A-L</h1>
  <p class="subtitle">Personal AI Listener</p>

  <div id="status" class="status">
    <div class="status-label">Status</div>
    <div class="status-text">Checking configuration...</div>
  </div>

  <button id="open-settings">Open Settings</button>
  <button id="reload-page" class="secondary-btn">Reload Current Page</button>

  <div class="divider"></div>

  <div class="info">
    The P-A-L sidebar appears on all web pages. Look for it on the right side of your browser!
  </div>

  <script src="popup.js"></script>
</body>
</html>
